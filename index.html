<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 기본 문서 설정 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 브라우저 탭에 표시되는 사이트 제목 -->
  <title>Forza 6 Tuning Archive</title>

    <!-- 링크 미리보기 설정 -->
  <meta property="og:title" content="Forza 6 Tuning Archive" />
  <meta
    property="og:description"
    content="차량별 튜닝값, 공유 코드, 테스트 기록, 페스티벌 튜닝차량을 정리하는 포르자 6 튜닝 아카이브입니다."
  />
  <meta
    property="og:image"
    content="https://lepe1210.github.io/forza6-tuning-archive-lepe/preview.png"
  />
  <meta
    property="og:url"
    content="https://lepe1210.github.io/forza6-tuning-archive-lepe/"
  />
  <meta property="og:type" content="website" />

  <!-- 트위터/X 링크 미리보기 설정 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forza 6 Tuning Archive" />
  <meta
    name="twitter:description"
    content="차량별 튜닝값, 공유 코드, 테스트 기록, 페스티벌 튜닝차량을 정리하는 포르자 6 튜닝 아카이브입니다."
  />
  <meta
    name="twitter:image"
    content="https://lepe1210.github.io/forza6-tuning-archive-lepe/preview.png"
  />

  <!-- 디자인 파일 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- =========================
       상단 메인 소개 영역
       ========================= -->
  <header class="hero">
    <div>
      <p class="eyebrow">FORZA 6 TUNING DATABASE</p>
      <h1>Forza 6 Tuning Archive</h1>

      <p class="hero-text">
        차량별 튜닝값, 주행 평가, 빌드 콘셉트를 정리하는 개인 아카이브입니다.
      </p>

      <!-- 디스코드 초대 링크 -->
      <a
        class="discord-link"
        href="https://discord.gg/7XCHcsxqqZ"
        target="_blank"
        rel="noopener noreferrer"
      >
        튜닝 문의와 피드백은 디스코드에서
      </a>
    </div>
  </header>

  <!-- =========================
       메인 콘텐츠 영역
       ========================= -->
  <main class="container">
    <!-- =========================
         페스티벌 튜닝차량 섹션
         weekly 시트 데이터를 불러와서 표시함
         ========================= -->
    <section class="weekly-section">
      <div class="section-header">
        <p class="eyebrow">FESTIVAL PLAYLIST PICKS</p>

        <!-- weekly 시트의 eventTitle 값으로 자동 변경됨 -->
        <h2 id="weeklyTitle">페스티벌 튜닝차량</h2>

        <p id="weeklyDescription">
          페스티벌 플레이리스트 진행용으로 추천하는 튜닝 차량입니다.
        </p>
      </div>

      <!-- weekly 시트 차량 카드가 들어가는 자리 -->
      <section id="weeklyGrid" class="weekly-grid"></section>
    </section>

    <!-- =========================
         PI별 평균 기록 섹션
         cars 시트의 테스트 트랙 기록을 기준으로 계산함
         ========================= -->
    <section class="average-section">
      <div class="section-header">
        <p class="eyebrow">TEST TRACK AVERAGE</p>
        <h2>PI별 평균 기록</h2>
        <p>
          전체 차량 DB 기준으로 테스트 트랙 A/B의 평균 기록을 계산합니다.
        </p>
      </div>

      <!-- script.js에서 PI별 평균 기록 카드가 들어가는 자리 -->
      <section id="averageGrid" class="average-grid"></section>
    </section>

    <!-- =========================
         검색 및 필터 영역
         cars 시트 전체 차량 DB를 필터링함
         ========================= -->
    <section class="controls">
      <!-- 차량명, 제조사, 콘셉트, 공유 코드 등을 검색 -->
      <input
        id="searchInput"
        type="text"
        placeholder="차량명, 제조사, 콘셉트, 공유 코드 검색"
      />

      <!-- PI 필터 -->
      <select id="classFilter">
        <option value="all">전체 PI</option>
        <option value="D 400">D 400</option>
        <option value="C 500">C 500</option>
        <option value="B 600">B 600</option>
        <option value="A 700">A 700</option>
        <option value="S1 800">S1 800</option>
        <option value="S2 900">S2 900</option>
        <option value="R 998">R 998</option>
        <option value="X 999">X 999</option>
      </select>

      <!-- 차량 분류 필터 -->
      <select id="typeFilter">
        <option value="all">전체 분류</option>
        <option value="버기">버기</option>
        <option value="클래식 머슬">클래식 머슬</option>
        <option value="클래식 레이스카">클래식 레이스카</option>
        <option value="클래식 랠리">클래식 랠리</option>
        <option value="클래식 스포츠카">클래식 스포츠카</option>
        <option value="컬트 자동차">컬트 자동차</option>
        <option value="드리프트 자동차">드리프트 자동차</option>
        <option value="대중 국산차">대중 국산차</option>
        <option value="익스트림 트랙토이">익스트림 트랙토이</option>
        <option value="GT 자동차">GT 자동차</option>
        <option value="핫 해치">핫 해치</option>
        <option value="하이퍼카">하이퍼카</option>
        <option value="모던 머슬">모던 머슬</option>
        <option value="모던 랠리">모던 랠리</option>
        <option value="모던 스포츠카">모던 스포츠카</option>
        <option value="모던 슈퍼 세단">모던 슈퍼 세단</option>
        <option value="모던 슈퍼카">모던 슈퍼카</option>
        <option value="오프로드">오프로드</option>
        <option value="픽업 및 4*4">픽업 및 4*4</option>
        <option value="랠리 몬스터">랠리 몬스터</option>
        <option value="희귀 클래식">희귀 클래식</option>
        <option value="레트로 핫 해치">레트로 핫 해치</option>
        <option value="레트로 머슬">레트로 머슬</option>
        <option value="레트로 레이서">레트로 레이서</option>
        <option value="레트로 랠리">레트로 랠리</option>
        <option value="레트로 스포츠카">레트로 스포츠카</option>
        <option value="레트로 슈퍼 세단">레트로 슈퍼 세단</option>
        <option value="레트로 슈퍼카">레트로 슈퍼카</option>
        <option value="로드 및 커스텀">로드 및 커스텀</option>
        <option value="스포츠 유틸리티 영웅">스포츠 유틸리티 영웅</option>
        <option value="슈퍼 GT">슈퍼 GT</option>
        <option value="슈퍼 핫 해치">슈퍼 핫 해치</option>
        <option value="트랙 토이">트랙 토이</option>
        <option value="UTV">UTV</option>
        <option value="언리미티드 버기">언리미티드 버기</option>
        <option value="언리미티드 오프로드">언리미티드 오프로드</option>
        <option value="유틸리티 히어로">유틸리티 히어로</option>
      </select>

      <!-- 구동방식 필터 -->
      <select id="driveFilter">
        <option value="all">전체 구동방식</option>
        <option value="FWD">FWD</option>
        <option value="RWD">RWD</option>
        <option value="4WD">4WD</option>
      </select>

      <!-- 용도 필터 -->
      <select id="categoryFilter">
        <option value="all">전체 용도</option>
        <option value="온로드">온로드</option>
        <option value="오프로드">오프로드</option>
        <option value="혼합">혼합</option>
        <option value="페스티벌 시즌 숙제">페스티벌 시즌 숙제</option>
      </select>
      <!-- 정렬 옵션 -->
      <select id="sortFilter">
        <option value="default">기본 정렬</option>
        <option value="manufacturer">제조사순</option>
        <option value="pi">PI순</option>
        <option value="updated">최근 수정순</option>
        <option value="trackA">호쿠부 빠른 순</option>
        <option value="trackB">트랙 B 빠른 순</option>
        <option value="trackC">세키베 빠른 순</option>
      </select>
    </section>

    <!-- =========================
         전체 차량 표시 개수
         ========================= -->
    <section class="stats">
      <span id="carCount">0대 표시 중</span>
    </section>

    <!-- =========================
         전체 차량 카드 목록
         cars 시트 데이터가 들어가는 자리
         ========================= -->
    <section id="carGrid" class="car-grid"></section>
  </main>

  <!-- =========================
       차량 상세창 모달
       차량 카드를 클릭하면 script.js가 이 안에 상세 정보를 넣음
       ========================= -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-button">×</button>

      <!-- 차량 상세 정보가 들어가는 자리 -->
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- =========================
       동작 코드 연결
       구글 시트 데이터 불러오기 / 검색 / 필터 / 모달 처리는 script.js에서 담당
       ========================= -->
  <script src="script.js"></script>
</body>
</html>
