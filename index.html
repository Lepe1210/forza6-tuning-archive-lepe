<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forza Tuning Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">FORZA TUNING DATABASE</p>
      <h1>Forza Tuning Archive</h1>
      <p class="hero-text">
        차량별 튜닝값, 주행 평가, 빌드 콘셉트를 정리하는 개인 아카이브입니다.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <input id="searchInput" type="text" placeholder="차량명, 제조사, 콘셉트 검색" />

      <select id="classFilter">
        <option value="all">전체 클래스</option>
        <option value="D500">D500</option>
        <option value="C600">C600</option>
        <option value="B700">B700</option>
        <option value="A800">A800</option>
        <option value="S1 900">S1 900</option>
        <option value="S2 998">S2 998</option>
      </select>

      <select id="driveFilter">
        <option value="all">전체 구동방식</option>
        <option value="FF">FF</option>
        <option value="FR">FR</option>
        <option value="MR">MR</option>
        <option value="RR">RR</option>
        <option value="AWD">AWD</option>
      </select>

      <select id="categoryFilter">
        <option value="all">전체 용도</option>
        <option value="온로드">온로드</option>
        <option value="오프로드">오프로드</option>
        <option value="혼합">혼합</option>
        <option value="페스티벌 시즌 숙제">페스티벌 시즌 숙제</option>
      </select>
    </section>

    <section class="stats">
      <span id="carCount">0대 표시 중</span>
    </section>

    <section id="carGrid" class="car-grid"></section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-button">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
